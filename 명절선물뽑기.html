<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 명절 선물 뽑기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --header-h: clamp(52px, 7vh, 96px);
  --timer-h: clamp(52px, 8vh, 112px);
  --slot-gap: clamp(3px, 0.45vw, 8px);
  --safe-pad: clamp(10px, 2vw, 34px);
  --slot-size: clamp(34px, calc((100vw - (var(--safe-pad) * 2) - (var(--slot-gap) * 9)) / 10), 142px);
}

body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #07071a;
  min-height: 100vh;
  min-height: 100dvh;
  color: white;
  overflow: hidden;
}

/* ========== STARS ========== */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 0.95; transform: scale(1.4); }
}

/* ========== FILE SCREEN ========== */
#file-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  background: radial-gradient(ellipse at 50% 40%, #1a0a3e 0%, #07071a 70%);
}
.file-card {
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: clamp(18px, 2vw, 28px);
  padding: clamp(30px, 5vw, 60px);
  text-align: center;
  max-width: min(480px, 92vw);
  width: 92%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 100px rgba(120,60,220,0.12);
  animation: floatCard 4s ease-in-out infinite;
}
@keyframes floatCard {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}
.file-icon { font-size: clamp(3.8rem, 10vw, 6rem); margin-bottom: 22px; display: block; animation: spin 6s linear infinite; }
@keyframes spin {
  0% { transform: rotate(-8deg) scale(1); }
  25% { transform: rotate(8deg) scale(1.1); }
  50% { transform: rotate(-5deg) scale(1); }
  75% { transform: rotate(6deg) scale(1.08); }
  100% { transform: rotate(-8deg) scale(1); }
}
.file-title {
  font-size: clamp(1.8rem, 6vw, 2.7rem); font-weight: 900; margin-bottom: 12px;
  background: linear-gradient(135deg, #ffd700, #ff6b9d, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.file-subtitle {
  color: rgba(255,255,255,0.6); font-size: clamp(0.88rem, 2.5vw, 1.05rem); line-height: 1.8; margin-bottom: 30px;
}
.file-subtitle strong { color: #ffd700; }
.file-hint {
  color: rgba(255,255,255,0.52);
  font-size: clamp(0.76rem, 2vw, 0.88rem);
  line-height: 1.6;
  margin-top: 14px;
}
.file-hint strong { color: #ffd700; }
.drop-zone {
  border: 2px dashed rgba(255,215,0,0.35);
  border-radius: 16px; padding: clamp(18px, 4vw, 28px) 20px; margin-bottom: 18px;
  cursor: pointer; transition: all 0.3s; background: rgba(255,215,0,0.03);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #ffd700; background: rgba(255,215,0,0.09); transform: scale(1.02);
}
.drop-zone-text { color: rgba(255,255,255,0.5); font-size: clamp(0.84rem, 2.2vw, 0.98rem); }
#fileInput { display: none; }
.btn-load {
  width: 100%; padding: 15px; font-family: inherit;
  background: linear-gradient(135deg, #6c5ce7, #a78bfa);
  border: none; border-radius: 14px;
  color: white; font-size: clamp(0.98rem, 2.5vw, 1.16rem); font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 6px 22px rgba(108,92,231,0.45);
}
.btn-load:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(108,92,231,0.65); }

/* ========== MAIN SCREEN ========== */
#main-screen {
  display: none; flex-direction: column; height: 100vh; height: 100dvh;
  position: relative; z-index: 1;
}

/* ---- Header ---- */
#header {
  display: grid; grid-template-columns: minmax(0,1fr) auto minmax(0,1fr); align-items: center;
  padding: 0 var(--safe-pad); height: var(--header-h);
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0; position: relative;
}
#title {
  position: static; transform: none;
  font-size: clamp(1.1rem, 3.2vw, 2.6rem); font-weight: 900; white-space: nowrap;
  background: linear-gradient(90deg, #ffd700, #ff6b9d, #a78bfa, #48dbfb, #ffd700);
  background-size: 300% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmerTitle 4s linear infinite;
}
@keyframes shimmerTitle {
  0% { background-position: 0% center; }
  100% { background-position: 300% center; }
}
#startBtn {
  margin-left: auto; padding: clamp(8px, 1.2vw, 14px) clamp(14px, 2vw, 28px);
  background: linear-gradient(135deg, #ff6b9d, #ffd700);
  border: none; border-radius: 25px;
  color: white; font-size: clamp(0.84rem, 1.7vw, 1.25rem); font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(255,107,157,0.45); white-space: nowrap;
}
#startBtn:hover:not(:disabled) {
  transform: scale(1.06) translateY(-1px);
  box-shadow: 0 8px 28px rgba(255,107,157,0.65);
}
#startBtn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ---- Timer ---- */
#timer-bar {
  text-align: center; flex-shrink: 0;
  height: var(--timer-h); display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.15);
}
#timer {
  font-size: clamp(2.4rem, 6.2vw, 6.5rem); font-weight: 900;
  color: #ffd700; display: inline-block; min-width: clamp(64px, 8vw, 128px); text-align: center;
  text-shadow: 0 0 30px rgba(255,215,0,0.55), 0 0 60px rgba(255,215,0,0.25);
  transition: color 0.2s;
}
#timer.beat { animation: timerBeat 0.45s cubic-bezier(0.36,0.07,0.19,0.97) forwards; }
@keyframes timerBeat {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.65); color: #ff6b6b;
         text-shadow: 0 0 40px rgba(255,107,107,0.9); }
  100% { transform: scale(1); }
}

/* ---- Play area ---- */
#play-area { flex: 1; position: relative; overflow: hidden; }

/* ---- Slots ---- */
#slots-container {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: grid;
  grid-template-columns: repeat(10, var(--slot-size));
  justify-content: center;
  gap: var(--slot-gap); padding: clamp(8px, 1.2vh, 14px) var(--safe-pad) clamp(10px, 1.5vh, 18px);
  max-height: min(42vh, 360px);
  overflow-y: auto;
  scrollbar-width: thin;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.06);
  transition: top 0.7s ease, padding 0.7s ease, background 0.7s ease;
}
.slot {
  width: 100%; min-height: var(--slot-size);
  border: 2px solid rgba(255,215,0,0.28);
  border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,215,0,0.05);
  transition: border-color 0.5s, background 0.5s, box-shadow 0.5s, width 0.7s ease, min-height 0.7s ease;
  padding: clamp(5px, 0.9vw, 10px) clamp(4px, 0.6vw, 8px);
}
.slot.filled {
  border-color: #ffd700;
  background: rgba(255,215,0,0.14);
  box-shadow: 0 0 22px rgba(255,215,0,0.28), inset 0 0 18px rgba(255,215,0,0.06);
}
.slot-number {
  font-size: clamp(0.95rem, 4vw, 4.2rem); font-weight: 900;
  color: #ffd700; line-height: 1;
}
.slot-name {
  font-size: clamp(0.68rem, 1.4vw, 1.35rem); color: rgba(255,255,255,0.92);
  margin-top: 5px; text-align: center;
  max-width: calc(var(--slot-size) - 10px); word-break: break-all; line-height: 1.25;
  opacity: 0; transform: scale(0.3) translateY(6px);
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
.slot.filled .slot-name { opacity: 1; transform: scale(1) translateY(0); }

#play-area.results-mode #slots-container {
  top: var(--result-top, 76px);
  bottom: 0;
  display: grid;
  grid-template-columns: repeat(var(--result-cols, 4), minmax(0, 1fr));
  grid-auto-rows: minmax(0, 1fr);
  align-content: center;
  justify-content: center;
  gap: clamp(4px, 0.65vw, 12px);
  padding: clamp(6px, 1vw, 18px);
  max-height: none;
  overflow-y: auto;
  background: rgba(0,0,0,0.28);
}

#play-area.results-mode .slot {
  width: 100%;
  min-height: 0;
  height: 100%;
  flex-direction: column;
  justify-content: center;
  gap: clamp(2px, 0.35vw, 8px);
  overflow: hidden;
  border-width: clamp(2px, 0.2vw, 4px);
  border-radius: clamp(14px, 1.6vw, 28px);
  padding: clamp(4px, 0.65vw, 12px);
  background: rgba(255,215,0,0.16);
}

#play-area.results-mode .slot-number {
  font-size: var(--result-number-size, clamp(2.2rem, 5vw, 6rem));
  flex-shrink: 0;
  min-width: 0;
  line-height: 0.9;
  text-align: center;
}

#play-area.results-mode .slot-name {
  width: 100%;
  max-width: 100%;
  font-size: var(--result-name-size, clamp(1.1rem, 2.2vw, 2.8rem));
  margin-top: 0;
  min-width: 0;
  overflow: hidden;
  text-overflow: clip;
  white-space: normal;
  word-break: keep-all;
  line-height: 1;
  text-align: center;
}

#play-area.results-mode .slot-name-line {
  display: block;
  white-space: nowrap;
  line-height: 1;
}

/* ---- Name cards ---- */
.name-card {
  position: absolute; padding: clamp(8px, 1.1vw, 16px) clamp(14px, 2vw, 30px);
  border-radius: 30px; font-weight: 700; font-size: clamp(1rem, 2.2vw, 2.5rem);
  color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.55);
  box-shadow: 0 5px 22px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
  white-space: nowrap; pointer-events: none; z-index: 20;
  will-change: left, top, transform, opacity;
  transition: none;
}

/* ---- Result message ---- */
#result-msg {
  display: none; position: absolute;
  top: clamp(8px, 1.4vh, 18px); left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, rgba(255,215,0,0.18), rgba(255,107,157,0.18));
  border: 1px solid rgba(255,215,0,0.45);
  border-radius: 22px; padding: clamp(9px, 1.3vw, 15px) clamp(18px, 3vw, 42px);
  font-size: clamp(0.95rem, 2vw, 1.65rem); font-weight: 700;
  color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5);
  white-space: nowrap; z-index: 30;
  animation: resultPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@media (max-width: 560px) {
  :root {
    --header-h: 54px;
    --timer-h: 58px;
    --slot-gap: 3px;
    --safe-pad: 10px;
    --slot-size: clamp(28px, calc((100vw - (var(--safe-pad) * 2) - (var(--slot-gap) * 9)) / 10), 74px);
  }

  #header {
    grid-template-columns: minmax(0,1fr) auto;
  }

  #header > div:first-child {
    display: none;
  }

  #title {
    justify-self: start;
    font-size: clamp(1rem, 5.2vw, 1.45rem);
  }

  #startBtn {
    border-radius: 18px;
    padding: 8px 12px;
  }

  .name-card {
    max-width: 46vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #result-msg {
    max-width: calc(100vw - 20px);
    white-space: normal;
    text-align: center;
  }

  #play-area.results-mode #slots-container {
    gap: 3px;
    padding: 6px;
  }

  #play-area.results-mode .slot {
    border-radius: 12px;
    padding: 3px 1px;
  }

  #play-area.results-mode .slot-name-line {
    transform: scaleX(0.86);
    transform-origin: center;
  }
}

@media (min-width: 1600px) {
  :root {
    --slot-size: clamp(130px, 7vw, 176px);
  }
}
@keyframes resultPop {
  from { transform: translateX(-50%) scale(0); opacity: 0; }
  to   { transform: translateX(-50%) scale(1); opacity: 1; }
}

/* ---- Confetti ---- */
.cp { position: fixed; pointer-events: none; z-index: 500; border-radius: 2px; }
@keyframes cpFall {
  0%   { transform: translateY(0) rotate(var(--rs,0deg)); opacity: 1; }
  85%  { opacity: 0.8; }
  100% { transform: translateY(110vh) rotate(var(--re,540deg)); opacity: 0; }
}
</style>
</head>
<body>

<div id="stars"></div>

<!-- ===== FILE SCREEN ===== -->
<div id="file-screen">
  <div class="file-card">
    <span class="file-icon">🎁</span>
    <h1 class="file-title">명절 선물 뽑기</h1>
    <p class="file-subtitle">
      참가자 이름이 담긴<br>
      <strong>Participants.txt</strong> 파일을 자동으로 확인 중입니다
    </p>
    <div class="drop-zone" id="dropZone">
      <p class="drop-zone-text">📂 클릭하거나 파일을 여기에 드래그하세요</p>
    </div>
    <input type="file" id="fileInput" accept=".txt">
    <button class="btn-load" id="loadBtn">파일 선택하기</button>
    <p class="file-hint" id="fileHint">
      같은 폴더에 <strong>Participants.txt</strong>가 있으면 자동으로 시작합니다.
    </p>
  </div>
</div>

<!-- ===== MAIN SCREEN ===== -->
<div id="main-screen">
  <header id="header">
    <div style="flex:1"></div>
    <h1 id="title">🎁 선물 뽑기 🎁</h1>
    <div style="flex:1;display:flex;justify-content:flex-end">
      <button id="startBtn" onclick="handleStartBtn()">🎊 뽑기시작</button>
    </div>
  </header>

  <div id="timer-bar">
    <span id="timer">🎁</span>
  </div>

  <div id="play-area">
    <div id="result-msg">🎉 추첨 완료! 결과를 확인하세요 🎉</div>
    <div id="slots-container"></div>
  </div>
</div>

<script>
'use strict';

/* ─────────────────────────────────────────
   CONSTANTS
   ───────────────────────────────────────── */
const GRADIENTS = [
  ['#ff6b6b','#feca57'], ['#48dbfb','#1dd1a1'], ['#ff9ff3','#f368e0'],
  ['#54a0ff','#5f27cd'], ['#fd79a8','#e84393'], ['#55efc4','#00b894'],
  ['#ff9f43','#ee5a24'], ['#a29bfe','#6c5ce7'], ['#00cec9','#0984e3'],
  ['#e17055','#d63031'], ['#badc58','#6ab04c'], ['#f9ca24','#f0932b'],
  ['#7bed9f','#2ed573'], ['#eccc68','#ffa502'], ['#70a1ff','#1e90ff'],
];

/* ─────────────────────────────────────────
   STATE
   ───────────────────────────────────────── */
let participants = [];
let cardObjs     = [];   // {name, el, x, y, vx, vy, rot, assignment}
let slotEls      = [];
let animId       = null;
let cntId        = null;
let timeLeft     = 10;
let drawPhase    = 'idle'; // idle | floating | settling | done
let audioCtx     = null;
let bgIntId      = null;
let resizeId     = null;

/* ─────────────────────────────────────────
   AUDIO ENGINE
   ───────────────────────────────────────── */
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, dur, type = 'sine', vol = 0.22, delay = 0) {
  const ctx = ac();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  osc.connect(g); g.connect(ctx.destination);
  const t = ctx.currentTime + delay;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.05);
}

function playTick(n) {
  if (n === 0) return;
  const freq = n <= 3 ? (n === 1 ? 1047 : 880) : 660;
  tone(freq, 0.1, 'square', 0.18);
}

function playWhoosh() {
  const ctx = ac();
  const len  = Math.floor(ctx.sampleRate * 0.45);
  const buf  = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const flt = ctx.createBiquadFilter(); flt.type = 'highpass'; flt.frequency.value = 400;
  const g   = ctx.createGain(); g.gain.value = 0.5;
  src.connect(flt); flt.connect(g); g.connect(ctx.destination);
  src.start();
}

function playFanfare() {
  // 밝은 C장조 팡파르
  const m = [
    [523.25, 0.12, 0.30, 0.00],
    [659.25, 0.12, 0.30, 0.13],
    [783.99, 0.12, 0.30, 0.26],
    [1046.5, 0.50, 0.42, 0.39],
    [783.99, 0.12, 0.28, 0.68],
    [1046.5, 0.70, 0.44, 0.82],
  ];
  m.forEach(([f,d,v,dl]) => tone(f, d, 'triangle', v, dl));
  tone(261.63, 0.42, 'sine', 0.20, 0.39);
  tone(261.63, 0.70, 'sine', 0.20, 0.82);
}

function playCheer() {
  // 짧은 효과음 — 카드가 슬롯에 닿을 때
  tone(880, 0.08, 'sine', 0.15);
  tone(1108, 0.08, 'sine', 0.12, 0.06);
}

function startBgMusic() {
  const seq = [523, 659, 784, 880, 1047, 880, 784, 659];
  let i = 0;
  bgIntId = setInterval(() => {
    if (drawPhase !== 'floating') return;
    tone(seq[i % seq.length], 0.22, 'triangle', 0.07);
    i++;
  }, 190);
}

function stopBgMusic() {
  if (bgIntId) { clearInterval(bgIntId); bgIntId = null; }
}

/* ─────────────────────────────────────────
   BACKGROUND STARS
   ───────────────────────────────────────── */
function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 110; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.4 + 0.5;
    Object.assign(s.style, {
      left:              Math.random() * 100 + 'vw',
      top:               Math.random() * 100 + 'vh',
      width:             sz + 'px',
      height:            sz + 'px',
      opacity:           (Math.random() * 0.5 + 0.1).toFixed(2),
      animation:         `twinkle ${1.4 + Math.random() * 2.6}s ${(Math.random()*3).toFixed(1)}s ease-in-out infinite`,
    });
    container.appendChild(s);
  }
}

/* ─────────────────────────────────────────
   FILE LOADING
   ───────────────────────────────────────── */
function parseNames(text) {
  return text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
}

function setFileHint(html) {
  document.getElementById('fileHint').innerHTML = html;
}

function renderSlotName(el, name) {
  el.textContent = '';
  const chars = Array.from(name);
  for (let i = 0; i < chars.length; i += 4) {
    const line = document.createElement('span');
    line.className = 'slot-name-line';
    line.textContent = chars.slice(i, i + 4).join('');
    el.appendChild(line);
  }
}

function makeTimestamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function getResultRows() {
  return cardObjs
    .map(card => ({ number: card.assignment, name: card.name }))
    .sort((a, b) => a.number - b.number);
}

function saveWinLog() {
  const rows = getResultRows();
  const timestamp = makeTimestamp();
  const lines = [
    '명절 선물 뽑기 당첨 결과',
    `저장시간: ${timestamp}`,
    `총 인원: ${rows.length}명`,
    '',
    ...rows.map(row => `${String(row.number).padStart(2, '0')}. ${row.name}`),
    '',
  ];
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Win_Log_${timestamp}.txt`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function initApp(names) {
  if (!names.length) return alert('이름을 찾을 수 없습니다.');
  participants = names;
  document.getElementById('file-screen').style.display = 'none';
  const ms = document.getElementById('main-screen');
  ms.style.display = 'flex';
  // Wait 2 frames so layout is computed
  requestAnimationFrame(() => requestAnimationFrame(() => {
    buildSlots();
    buildCards();
    beginIdleFloat();
  }));
}

document.getElementById('loadBtn').onclick    = () => document.getElementById('fileInput').click();
document.getElementById('dropZone').onclick   = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').addEventListener('change', function () {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => initApp(parseNames(e.target.result));
  r.readAsText(f, 'UTF-8');
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) { const r = new FileReader(); r.onload = ev => initApp(parseNames(ev.target.result)); r.readAsText(f,'UTF-8'); }
});

// Auto-load Participants.txt when the page is served over HTTP.
(async () => {
  try {
    const res = await fetch('Participants.txt', { cache: 'no-store' });
    if (!res.ok) throw new Error('Participants.txt not found');

    const t = await res.text();
    const n = parseNames(t);
    if (n.length) {
      initApp(n);
      return;
    }

    setFileHint('<strong>Participants.txt</strong> 안에서 이름을 찾지 못했습니다. 파일 내용을 확인하거나 직접 선택하세요.');
  } catch (_) {
    if (location.protocol === 'file:') {
      setFileHint('HTML을 직접 열면 브라우저 보안 때문에 같은 폴더 파일도 자동으로 읽을 수 없습니다.<br>파일 선택 없이 쓰려면 HTTP 환경에서 열어야 합니다.');
    } else {
      setFileHint('<strong>Participants.txt</strong>를 자동으로 찾지 못했습니다. 같은 폴더에 있는지 확인하거나 직접 선택하세요.');
    }
  }
})();

/* ─────────────────────────────────────────
   BUILD UI
   ───────────────────────────────────────── */
function buildSlots() {
  const c = document.getElementById('slots-container');
  c.innerHTML = ''; slotEls = [];
  c.style.setProperty('--participant-count', participants.length);
  participants.forEach((_, i) => {
    const slot = document.createElement('div');
    slot.className = 'slot'; slot.id = 'slot' + (i+1);
    slot.innerHTML = `<div class="slot-number">${i+1}</div><div class="slot-name" id="sn${i+1}"></div>`;
    c.appendChild(slot); slotEls.push(slot);
  });
}

function buildCards() {
  document.querySelectorAll('.name-card').forEach(e => e.remove());
  cardObjs = [];
  const pa  = document.getElementById('play-area');
  const sc  = document.getElementById('slots-container');
  const W   = pa.clientWidth;
  const SH  = sc.offsetHeight || 160;
  const H   = pa.clientHeight - SH - 20;
  const n   = participants.length;

  participants.forEach((name, i) => {
    const [c1, c2] = GRADIENTS[i % GRADIENTS.length];
    const el = document.createElement('div');
    el.className = 'name-card';
    el.textContent = name;
    el.style.background = `linear-gradient(135deg,${c1},${c2})`;
    pa.appendChild(el);
    const cw = el.offsetWidth  || Math.min(160, W * 0.42);
    const ch = el.offsetHeight || 44;

    // Spread cards evenly across the floating zone
    const cols  = Math.ceil(Math.sqrt(n));
    const rows  = Math.ceil(n / cols);
    const col   = i % cols;
    const row   = Math.floor(i / cols);
    const gx    = W * 0.08 + (col / Math.max(cols-1, 1)) * W * 0.84;
    const gy    = H * 0.08 + (row / Math.max(rows-1, 1)) * H * 0.78;
    const x     = Math.max(0, Math.min(Math.max(0, W - cw), gx + (Math.random()-0.5)*50));
    const y     = Math.max(0, Math.min(Math.max(0, H - ch), gy + (Math.random()-0.5)*30));

    el.style.left = x + 'px';
    el.style.top  = y + 'px';

    cardObjs.push({ name, el, x, y, vx: 0, vy: 0, rot: 0, assignment: 0 });
  });
}

/* ─────────────────────────────────────────
   ANIMATION LOOPS
   ───────────────────────────────────────── */
function stopAnim() { if (animId) { cancelAnimationFrame(animId); animId = null; } }

function getBounds(card) {
  const pa = document.getElementById('play-area');
  const sc = document.getElementById('slots-container');
  return {
    maxX: Math.max(0, pa.clientWidth  - (card.el.offsetWidth  || 160)),
    maxY: Math.max(0, pa.clientHeight - (sc.offsetHeight || 160) - 20 - (card.el.offsetHeight || 52)),
  };
}

function handleResize() {
  clearTimeout(resizeId);
  resizeId = setTimeout(() => {
    if (!participants.length) return;
    if (drawPhase === 'idle') {
      stopAnim();
      buildCards();
      beginIdleFloat();
    } else if (drawPhase === 'done') {
      fitResultBoard();
    }
  }, 140);
}

function fitResultBoard() {
  const pa = document.getElementById('play-area');
  const slots = document.getElementById('slots-container');
  const msg = document.getElementById('result-msg');
  const n = Math.max(participants.length, 1);
  const msgBottom = msg.offsetTop + msg.offsetHeight + Math.max(6, pa.clientHeight * 0.012);
  const W = Math.max(1, pa.clientWidth);
  const H = Math.max(1, pa.clientHeight - msgBottom);
  const cols = Math.min(10, n);
  const rows = Math.ceil(n / cols);
  const cellW = W / cols;
  const cellH = H / rows;
  const dense = rows >= 6;
  const numberSize = Math.max(18, Math.min(cellH * (dense ? 0.34 : 0.4), cellW * 0.4));
  const nameSize = Math.max(9, Math.min(cellH * (dense ? 0.19 : 0.22), cellW / 4.25));
  slots.style.setProperty('--result-top', msgBottom + 'px');
  slots.style.setProperty('--result-cols', cols);
  slots.style.setProperty('--result-number-size', `clamp(1.1rem, ${numberSize.toFixed(1)}px, 8rem)`);
  slots.style.setProperty('--result-name-size', `clamp(0.56rem, ${nameSize.toFixed(1)}px, 3.2rem)`);
}

function showResultBoard() {
  document.getElementById('result-msg').style.display = 'block';
  document.getElementById('play-area').classList.add('results-mode');
  requestAnimationFrame(fitResultBoard);
  saveWinLog();
}

/* Gentle idle float — sinusoidal */
function beginIdleFloat() {
  drawPhase = 'idle';
  const base = cardObjs.map(c => ({ x: c.x, y: c.y }));
  let t = 0;
  function loop() {
    if (drawPhase !== 'idle') return;
    t += 0.011;
    cardObjs.forEach((card, i) => {
      const bx  = base[i].x, by = base[i].y;
      const amp = 13;
      const fx  = 0.38 + (i * 0.19) % 0.42;
      const fy  = 0.28 + (i * 0.14) % 0.38;
      const px  = i * 1.2, py = i * 0.85;
      const { maxX, maxY } = getBounds(card);
      card.x = Math.max(0, Math.min(maxX, bx + Math.sin(t*fx+px)*amp));
      card.y = Math.max(0, Math.min(maxY, by + Math.cos(t*fy+py)*amp));
      card.el.style.left = card.x + 'px';
      card.el.style.top  = card.y + 'px';
    });
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

/* Wild chaos float — random-walk velocity */
function beginChaosFloat() {
  drawPhase = 'floating';
  cardObjs.forEach(card => {
    card.vx  = (Math.random()-0.5) * 12;
    card.vy  = (Math.random()-0.5) * 12;
    card.rot = Math.random() * 360;
  });
  function loop() {
    if (drawPhase !== 'floating') return;
    cardObjs.forEach(card => {
      card.vx += (Math.random()-0.5) * 0.7;
      card.vy += (Math.random()-0.5) * 0.7;
      const spd = Math.hypot(card.vx, card.vy);
      const max = 7;
      if (spd > max) { card.vx *= max/spd; card.vy *= max/spd; }
      card.x += card.vx; card.y += card.vy;
      const { maxX, maxY } = getBounds(card);
      if (card.x < 0)    { card.x = 0;    card.vx =  Math.abs(card.vx); }
      if (card.x > maxX) { card.x = maxX; card.vx = -Math.abs(card.vx); }
      if (card.y < 0)    { card.y = 0;    card.vy =  Math.abs(card.vy); }
      if (card.y > maxY) { card.y = maxY; card.vy = -Math.abs(card.vy); }
      card.rot += card.vx * 1.3;
      card.el.style.left      = card.x + 'px';
      card.el.style.top       = card.y + 'px';
      card.el.style.transform = `rotate(${card.rot}deg)`;
    });
    animId = requestAnimationFrame(loop);
  }
  animId = requestAnimationFrame(loop);
}

/* ─────────────────────────────────────────
   SETTLE TO SLOTS
   ───────────────────────────────────────── */
function settleAllCards() {
  drawPhase = 'settling';
  stopAnim(); stopBgMusic();
  playFanfare();

  const pa     = document.getElementById('play-area');
  const paRect = pa.getBoundingClientRect();

  // Stagger each card settling
  cardObjs.forEach((card, idx) => {
    const slot   = slotEls[card.assignment - 1];
    const sr     = slot.getBoundingClientRect();
    const cw     = card.el.offsetWidth  || 100;
    const ch     = card.el.offsetHeight || 38;
    const tx     = sr.left - paRect.left + sr.width  / 2 - cw / 2;
    const ty     = sr.top  - paRect.top  + sr.height / 2 - ch / 2;
    const dur    = 0.75 + idx * 0.05;

    card.el.style.transition = `left ${dur}s cubic-bezier(0.34,1.56,0.64,1),`
                              + `top ${dur}s cubic-bezier(0.34,1.56,0.64,1),`
                              + `transform 0.4s ease, opacity 0.4s ease`;
    card.el.style.left      = tx + 'px';
    card.el.style.top       = ty + 'px';
    card.el.style.transform = 'rotate(0deg) scale(0.85)';

    const landMs = (dur * 1000) + idx * 40;
    setTimeout(() => {
      playCheer();
      card.el.style.opacity = '0';
      renderSlotName(document.getElementById('sn' + card.assignment), card.name);
      slot.classList.add('filled');
      setTimeout(() => { if (card.el.parentNode) card.el.remove(); }, 400);
    }, landMs);
  });

  spawnConfetti();

  const maxLand = (0.75 + (cardObjs.length-1) * 0.05) * 1000 + (cardObjs.length-1) * 40 + 600;
  setTimeout(() => {
    drawPhase = 'done';
    showResultBoard();
    const btn = document.getElementById('startBtn');
    btn.disabled = false;
    btn.textContent = '🔄 다시하기';
  }, maxLand);
}

/* ─────────────────────────────────────────
   CONFETTI
   ───────────────────────────────────────── */
const CONFETTI_COLORS = ['#ffd700','#ff6b6b','#48dbfb','#ff9ff3','#55efc4','#a29bfe','#feca57','#fd79a8','#7bed9f','#eccc68'];

function spawnConfetti() {
  for (let i = 0; i < 140; i++) {
    setTimeout(() => {
      const p   = document.createElement('div');
      p.className = 'cp';
      const sz  = 6 + Math.random() * 11;
      const rs  = (Math.random() * 180).toFixed(0) + 'deg';
      const re  = ((Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 720)).toFixed(0) + 'deg';
      const dur = (2.2 + Math.random() * 3).toFixed(2) + 's';
      p.style.cssText = `
        left:${(5+Math.random()*90).toFixed(1)}vw;
        top:-22px;
        width:${sz.toFixed(1)}px;
        height:${(sz*(0.5+Math.random()*1.2)).toFixed(1)}px;
        background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
        border-radius:${Math.random()>0.45?'50%':'3px'};
        --rs:${rs};--re:${re};
        animation:cpFall ${dur} ${(Math.random()*0.6).toFixed(2)}s linear forwards;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6500);
    }, i * 22);
  }
}

/* ─────────────────────────────────────────
   DRAW LOGIC
   ───────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function assignNumbers() {
  const nums = shuffle([...Array(participants.length)].map((_,i) => i+1));
  cardObjs.forEach((c, i) => c.assignment = nums[i]);
}

function runCountdown() {
  timeLeft = 10;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timeLeft;
  timerEl.style.color = '#ffd700';

  cntId = setInterval(() => {
    timeLeft--;
    timerEl.classList.remove('beat');
    void timerEl.offsetWidth; // force reflow for re-trigger
    timerEl.textContent = timeLeft > 0 ? timeLeft : '🎉';
    timerEl.style.color = timeLeft <= 3 ? '#ff6b6b' : '#ffd700';
    timerEl.classList.add('beat');
    playTick(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(cntId); cntId = null;
      settleAllCards();
    }
  }, 1000);
}

function handleStartBtn() {
  if (drawPhase === 'done') { resetAll(); return; }
  if (drawPhase !== 'idle') return;

  document.getElementById('startBtn').disabled    = true;
  document.getElementById('startBtn').textContent = '🎊 진행중...';
  document.getElementById('result-msg').style.display = 'none';

  ac().resume(); // unlock AudioContext on user gesture
  playWhoosh();
  stopAnim();
  assignNumbers();
  beginChaosFloat();
  startBgMusic();
  runCountdown();
}

function resetAll() {
  stopAnim(); stopBgMusic();
  if (cntId) { clearInterval(cntId); cntId = null; }
  document.querySelectorAll('.name-card, .cp').forEach(e => e.remove());
  document.getElementById('play-area').classList.remove('results-mode');
  slotEls.forEach((slot, i) => {
    slot.classList.remove('filled');
    document.getElementById('sn' + (i+1)).textContent = '';
  });
  const timerEl = document.getElementById('timer');
  timerEl.textContent = '🎁';
  timerEl.style.color  = '#ffd700';
  timerEl.classList.remove('beat');
  document.getElementById('result-msg').style.display = 'none';
  const btn = document.getElementById('startBtn');
  btn.disabled = false; btn.textContent = '🎊 뽑기시작';
  buildCards();
  beginIdleFloat();
}

/* ─────────────────────────────────────────
   INIT
   ───────────────────────────────────────── */
buildStars();
window.addEventListener('resize', handleResize);
</script>
